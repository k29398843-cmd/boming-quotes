<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1a5276">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="博鸣报价">
<title>精装房局部改造报价单</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="top-bar">
  <div class="logo"><a href="index.html">博鸣报价</a></div>
  <div class="nav-links">
    <a href="index.html">首页</a>
    <a href="renovation.html" class="active">改造报价</a>
    <a href="sunroom.html">阳光房报价</a>
  </div>
</div>

<div class="container">

  <div class="card">
    <div class="card-title">📋 项目信息</div>
    <div class="form-row">
      <div class="form-group">
        <label>项目名称</label>
        <input type="text" id="projectName" placeholder="如：领誉华府北区7栋301精装房局部改造" oninput="autoSave()">
      </div>
      <div class="form-group">
        <label>业主</label>
        <input type="text" id="ownerName" placeholder="业主姓名" oninput="autoSave()">
      </div>
      <div class="form-group">
        <label>联系电话</label>
        <input type="tel" id="ownerPhone" placeholder="联系电话" oninput="autoSave()">
      </div>
    </div>
  </div>

  <div class="card print-full">
    <div class="card-title">📄 项目明细</div>
    <div class="btn-group no-print">
      <button class="btn btn-primary" onclick="addItem()">＋ 添加项目</button>
      <button class="btn btn-primary" onclick="addSubItem()">＋ 添加子项</button>
    </div>
    <div class="table-wrap">
      <table id="itemTable">
        <thead>
          <tr>
            <th style="width:44px">序号</th>
            <th style="min-width:180px">项目名称</th>
            <th style="width:60px">单位</th>
            <th style="width:72px">数量</th>
            <th style="width:88px">单价(元)</th>
            <th style="width:96px">总价(元)</th>
            <th style="min-width:140px">备注</th>
            <th class="no-print" style="width:80px">操作</th>
          </tr>
        </thead>
        <tbody id="itemBody"></tbody>
      </table>
    </div>

    <div class="grand-total-display">
      合计：<span class="amount" id="grandTotal">0.00</span>
    </div>

    <div class="form-row" style="margin-top:12px;">
      <div class="form-group" style="max-width:250px;">
        <label>优惠价（减扣金额）</label>
        <input type="number" id="discount" step="0.01" min="0" placeholder="优惠金额" oninput="calcTotals();autoSave();">
      </div>
      <div class="form-group" style="max-width:350px;">
        <label>赠送 / 备注说明</label>
        <input type="text" id="giftNote" placeholder="如：赠送主卧飘窗处打掉20cm" oninput="autoSave()">
      </div>
    </div>
    <div class="grand-total-display" style="font-size:18px;">
      优惠后合计：<span class="amount" id="finalTotal" style="font-size:26px;">0.00</span>
    </div>
  </div>

  <div class="card print-full">
    <div class="card-title">✍️ 签字确认</div>
    <div class="signature-area">
      <div class="signature-block">
        <div class="label">甲方</div>
        <div class="sign-line"><input type="text" placeholder="甲方签字" oninput="autoSave()"></div>
        <div class="sign-line"><input type="text" placeholder="联系电话" oninput="autoSave()"></div>
      </div>
      <div class="signature-block">
        <div class="label">乙方</div>
        <div class="sign-line"><input type="text" id="partyB" value="深圳心品建设工程有限公司" oninput="autoSave()"></div>
        <div class="sign-line"><input type="text" id="partyBContact" placeholder="联系人及电话" oninput="autoSave()"></div>
      </div>
    </div>
  </div>

  <div class="card no-print">
    <div class="btn-group">
      <button class="btn btn-accent" onclick="printPage()">🖨️ 打印 / 导出PDF</button>
      <button class="btn btn-outline" onclick="resetAll()">🗑️ 重置默认</button>
    </div>
  </div>

</div>

<script src="js/shared.js"></script>
<script>
var items=[],SK='renovation_data';
function D(){return[{name:'主卧墙及主卧阳台墙、地面',unit:'项',qty:1,price:7800,note:'电梯口、房间、过道等保护、墙体、阳台砖、门、护栏拆除、墙地面找平修补，腻子、油漆（多乐士乳胶漆），垃圾清理，外运、以上含材料人工',isSub:0},{name:'主卧木地板',unit:'项',qty:1,price:4500,note:'阳台与主卧木地板修补，用原大自然同款、同色号（因不同批次及新旧关系，会有少许色差）。',isSub:0},{name:'主卧改电',unit:'项',qty:1,price:1500,note:'主卧所有电源，增、减（电线用金龙羽2.5多芯）含人工，及辅材，面盖业主自购',isSub:0},{name:'主卧窗台石',unit:'项',qty:1,price:1500,note:'天然大理石，（含材料、人工）',isSub:0},{name:'主卧封窗-FQ115系列断桥系统窗',unit:'㎡',qty:6.75,price:999,note:'品名:富球铝业，断桥115窗纱一体平开窗，厚度2.0，玻璃6白+18A+6灰LOW-E中空隔音玻璃，颜色内-氟碳星空灰(外)与本小区铝合金门窗外观颜色一致，五金配件-进口斯坦福',isSub:0},{name:'  └ 开启扇',unit:'个',qty:1,price:999,note:'',isSub:1},{name:'主卫改造',unit:'项',qty:1,price:13800,note:'原浴缸，窗台石，拆除，改下水管，修补原浴缸周边墙体，重做防水，大理石踏板，窗台石(天然大理石)加装隔断，上述含材料、人工。',isSub:0},{name:'大阳台封窗（同主卧型材一致）',unit:'㎡',qty:21.7,price:999,note:'品名:富球铝业，断桥115窗纱一体平开窗，厚度2.0，玻璃6白+18A+6灰LOW-E中空隔音玻璃，颜色内-氟碳星空灰(外)与本小区铝合金门窗外观颜色一致，五金配件-进口斯坦福',isSub:0},{name:'  └ 小阳台封窗（同主卧型材一致）',unit:'㎡',qty:11.7,price:999,note:'',isSub:1},{name:'  └ 开启扇',unit:'个',qty:6,price:999,note:'',isSub:1},{name:'大、小阳台封窗位贴砖',unit:'项',qty:1,price:6500,note:'含主材（含水泥、沙等辅材、人工）',isSub:0},{name:'客厅通铺大阳台地面贴砖（包砖）',unit:'项',qty:1,price:7800,note:'拆除原地砖，含主材，（含水泥、沙等辅材、人工）',isSub:0},{name:'餐厅通铺小阳台地面贴砖（包砖）',unit:'项',qty:1,price:3500,note:'拆除原地砖，含主材、人工',isSub:0},{name:'大阳台墙面（包砖）',unit:'项',qty:1,price:7800,note:'铲除墙体表面、含主材，（含背胶、德高瓷砖胶、水泥等辅材及人工）',isSub:0},{name:'小阳台墙面（包砖）',unit:'项',qty:1,price:6500,note:'',isSub:0},{name:'大阳台阳台柜',unit:'项',qty:1,price:7000,note:'材质铝合金，颜色__，款式__，台面__，是/否改水、电，是/否砌台（含材料、人工）',isSub:0},{name:'小阳台阳台柜',unit:'项',qty:1,price:5000,note:'',isSub:0},{name:'大阳台下水管处理',unit:'项',qty:1,price:1500,note:'用铝合金包下水管，含材料、人工。',isSub:0},{name:'大阳台增加水位',unit:'项',qty:1,price:4500,note:'卫生间天花板处引水，阳台处明/暗管（联塑水管），含材料人工。',isSub:0},{name:'餐厅厨房改造',unit:'项',qty:1,price:7800,note:'拆除原餐厅平开窗部分墙体及小阳台地面瓷砖，含材料、人工，墙体修复。',isSub:0},{name:'整屋改电',unit:'个',qty:1,price:130,note:'所有电源，增、减(电线用金龙羽2.5多芯)含人工，及辅材，按插座位算',isSub:0},{name:'次卧推拉门（大儿子房推拉门）',unit:'平方',qty:5.38,price:999,note:'原推拉门拆除，墙体复原，两轨两扇35*16极窄推拉门，厚度2.0，8厘超白玻。',isSub:0},{name:'  └ 推拉门双包套',unit:'米',qty:6.8,price:288,note:'',isSub:1},{name:'  └ 门槛大理石',unit:'项',qty:1,price:1500,note:'',isSub:1},{name:'大阳台及主卧窗帘位吊顶',unit:'项',qty:1,price:0,note:'9厘皇冠木板，9厘可耐福防潮板，含材料人工。',isSub:0},{name:'FQ厨房推拉窗',unit:'项',qty:1,price:1980,note:'拆除原平开窗，复原墙体，加装推拉窗，含材料、人工。',isSub:0},{name:'厨房三扇联动推拉门',unit:'平方',qty:5.65,price:1180,note:'35*16厨房极窄三扇连动推拉门，厚度2.0，8厘超白玻。含材料及人工',isSub:0},{name:'  └ 推拉门双包套',unit:'米',qty:7.2,price:288,note:'',isSub:1},{name:'  └ 门槛大理石',unit:'项',qty:1,price:500,note:'',isSub:1},{name:'卧室换窗-FQ115系列断桥系统窗',unit:'平方',qty:13.6,price:999,note:'品名:富球铝业，断桥115窗纱一体平开窗，厚度2.0，玻璃6白+18A+6灰LOW-E中空隔音玻璃，颜色内-氟碳星空灰(外)与本小区铝合金门窗外观颜色一致，五金配件-进口斯坦福',isSub:0},{name:'  └ 开启扇',unit:'个',qty:4,price:999,note:'',isSub:1},{name:'公卫及套卫换窗-FQ115系列断桥系统窗',unit:'平方',qty:2.4,price:999,note:'品名:富球铝业，断桥115窗纱一体平开窗，厚度2.0，玻璃6白+18A+6超白玉纱中空隔音玻璃，颜色内-氟碳星空灰(外)与本小区铝合金门窗外观颜色一致，五金配件-进口斯坦福',isSub:0},{name:'  └ 开启扇',unit:'个',qty:2,price:999,note:'',isSub:1},{name:'美缝（整屋瓷砖位）',unit:'项',qty:1,price:6500,note:'德高品牌，含材料、人工，是全屋瓷砖位。',isSub:0},{name:'整屋踢脚线',unit:'米',qty:1,price:55,note:'拆除原踢脚线，用铝合金材质，含材料、人工，实量实算。',isSub:0},{name:'入户打鞋柜',unit:'项',qty:1,price:7500,note:'打墙、地面天花及强弱电箱移位。含材料及人工',isSub:0},{name:'整屋改造后刷白漆',unit:'项',qty:1,price:8500,note:'含主材及人工，多乐士乳胶漆',isSub:0},{name:'打飘窗(包含木地板修复)',unit:'个',qty:4,price:8000,note:'主卫一个，小孩房一个，空调位一个，大阳台一个',isSub:0},{name:'门口入户鞋柜',unit:'项',qty:1,price:3500,note:'铝合金材质，含材料人工',isSub:0}]}
function init(){var s=loadData(SK,null);if(s){document.getElementById('projectName').value=s.projectName||'';document.getElementById('ownerName').value=s.ownerName||'';document.getElementById('ownerPhone').value=s.ownerPhone||'';document.getElementById('discount').value=s.discount||'';document.getElementById('giftNote').value=s.giftNote||'';items=s.items||[];var sigs=document.querySelectorAll('.signature-block .sign-line input');if(sigs.length>=4){sigs[0].value=s.signA||'';sigs[1].value=s.signAPhone||'';sigs[2].value=s.signB||'深圳心品建设工程有限公司';sigs[3].value=s.signBContact||''}}else items=D();renderTable()}
function G(){var sigs=document.querySelectorAll('.signature-block .sign-line input');return{projectName:document.getElementById('projectName').value,ownerName:document.getElementById('ownerName').value,ownerPhone:document.getElementById('ownerPhone').value,discount:document.getElementById('discount').value,giftNote:document.getElementById('giftNote').value,items:items,signA:sigs[0]?sigs[0].value:'',signAPhone:sigs[1]?sigs[1].value:'',signB:sigs[2]?sigs[2].value:'深圳心品建设工程有限公司',signBContact:sigs[3]?sigs[3].value:''}}
function autoSave(){saveData(SK,G())}
function renderTable(){var tbody=document.getElementById('itemBody');tbody.innerHTML='';var total=0;items.forEach(function(item,i){var tr=document.createElement('tr');if(item.isSub)tr.style.background='#fafbfc'
var tdNum=document.createElement('td');tdNum.className='row-num';tdNum.textContent=i+1;tr.appendChild(tdNum)
var tdName=document.createElement('td');var inpName=document.createElement('input');inpName.type='text';inpName.value=item.name;inpName.placeholder='项目名称';inpName.oninput=function(){item.name=this.value;scheduleAutoSave(SK,G)};tdName.appendChild(inpName);tr.appendChild(tdName)
var tdUnit=document.createElement('td');var inpUnit=document.createElement('input');inpUnit.type='text';inpUnit.value=item.unit;inpUnit.placeholder='单位';inpUnit.className='num-input';inpUnit.oninput=function(){item.unit=this.value;scheduleAutoSave(SK,G)};tdUnit.appendChild(inpUnit);tr.appendChild(tdUnit)
var tdQty=document.createElement('td');var inpQty=document.createElement('input');inpQty.type='number';inpQty.step='any';inpQty.min='0';inpQty.value=item.qty;inpQty.placeholder='数量';inpQty.className='num-input';inpQty.oninput=function(){item.qty=parseFloat(this.value)||0;calcItemTotal(tr,item);scheduleAutoSave(SK,G)};tdQty.appendChild(inpQty);tr.appendChild(tdQty)
var tdPrice=document.createElement('td');var inpPrice=document.createElement('input');inpPrice.type='number';inpPrice.step='any';inpPrice.min='0';inpPrice.value=item.price;inpPrice.placeholder='单价';inpPrice.className='num-input';inpPrice.oninput=function(){item.price=parseFloat(this.value)||0;calcItemTotal(tr,item);scheduleAutoSave(SK,G)};tdPrice.appendChild(inpPrice);tr.appendChild(tdPrice)
var tdTotal=document.createElement('td');tdTotal.className='num-input';tdTotal.style.fontWeight='500';var lt=(item.qty||0)*(item.price||0);tdTotal.textContent=lt>0?lt.toFixed(2):'0.00';tr.appendChild(tdTotal)
var tdNote=document.createElement('td');var inpNote=document.createElement('textarea');inpNote.rows=1;inpNote.value=item.note||'';inpNote.placeholder='备注说明';inpNote.style.minHeight='auto';inpNote.oninput=function(){item.note=this.value;scheduleAutoSave(SK,G)};inpNote.addEventListener('input',function(){this.style.height='auto';this.style.height=this.scrollHeight+'px'});tdNote.appendChild(inpNote);tr.appendChild(tdNote)
var tdAction=document.createElement('td');tdAction.className='table-actions no-print'
var btnUp=document.createElement('button');btnUp.className='btn btn-sm btn-outline';btnUp.textContent='▲';btnUp.title='上移';btnUp.onclick=function(){if(i>0){var t=items[i];items[i]=items[i-1];items[i-1]=t;renderTable();scheduleAutoSave(SK,G)}};tdAction.appendChild(btnUp)
var btnDn=document.createElement('button');btnDn.className='btn btn-sm btn-outline';btnDn.textContent='▼';btnDn.title='下移';btnDn.onclick=function(){if(i<items.length-1){var t=items[i];items[i]=items[i+1];items[i+1]=t;renderTable();scheduleAutoSave(SK,G)}};tdAction.appendChild(btnDn)
var btnDel=document.createElement('button');btnDel.className='btn btn-sm btn-danger';btnDel.textContent='✕';btnDel.title='删除';btnDel.onclick=function(){if(confirm('确认删除「'+item.name+'」？')){items.splice(i,1);renderTable();scheduleAutoSave(SK,G)}};tdAction.appendChild(btnDel);tr.appendChild(tdAction)
tbody.appendChild(tr);total+=lt})
document.getElementById('grandTotal').textContent=total.toFixed(2);calcTotals()}
function calcItemTotal(tr,item){var tds=tr.querySelectorAll('td');if(tds.length>=6)tds[5].textContent=((item.qty||0)*(item.price||0)).toFixed(2);calcTotals()}
function calcTotals(){var t=0;items.forEach(function(it){t+=(it.qty||0)*(it.price||0)});document.getElementById('grandTotal').textContent=t.toFixed(2);var d=parseFloat(document.getElementById('discount').value)||0;document.getElementById('finalTotal').textContent=Math.max(0,t-d).toFixed(2)}
function addItem(){items.push({name:'',unit:'项',qty:1,price:0,note:'',isSub:0});renderTable();scheduleAutoSave(SK,G)}
function addSubItem(){items.push({name:'',unit:'个',qty:1,price:0,note:'',isSub:1});renderTable();scheduleAutoSave(SK,G)}
function resetAll(){if(confirm('确认重置所有数据？此操作不可撤销。')){localStorage.removeItem('boming_'+SK);location.reload()}}
init();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", function() {
    navigator.serviceWorker.register("sw.js").then(function(reg){
      console.log("SW registered:", reg.scope);
    }).catch(function(err){
      console.log("SW registration failed:", err);
    });
  });
}
</script>
</body>
</html>
